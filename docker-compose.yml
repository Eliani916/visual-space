services:
  mysql:
    image: mysql:8.0
    container_name: photobooth_mysql
    environment:
      MYSQL_ROOT_PASSWORD: eliani
      MYSQL_DATABASE: photobooth_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  # Next.js App
  web:
    image: node:22-alpine
    container_name: photobooth_app
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - DATABASE_URL=mysql://root:eliani@mysql:3306/photobooth_db
      - HOSTNAME=0.0.0.0
    depends_on:
      - mysql
    command: sh -c "apk add --no-cache openssl && npm install && npx prisma@5 generate && npx prisma@5 db push && npx prisma@5 db seed && npm run dev -- -H 0.0.0.0"

volumes:
  mysql_data:
