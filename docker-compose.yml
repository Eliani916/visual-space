services:

  db:
    image: mysql:8.0
    container_name: photobooth_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: photobooth_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  app:
    build: .
    container_name: photobooth_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://root:secret@db:3306/photobooth_db
    volumes:
      - app_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  db_data:
  app_uploads: